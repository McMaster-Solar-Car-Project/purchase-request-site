name: Build and Deploy to Production
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: false
        default: 'false'
        type: boolean
env:
  DEBUG: ${{ vars.DEBUG }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_TAB_NAME: ${{ vars.GOOGLE_SHEET_TAB_NAME }}
  HOST: ${{ vars.HOST }}
  PARENT_FOLDER_ID: ${{ vars.PARENT_FOLDER_ID }}
  PORT: ${{ vars.PORT }}
  RUN_LIVE_PIPELINE_TEST: ${{ vars.RUN_LIVE_PIPELINE_TEST }}
jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/purchase-request-site
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/purchase-request-site:main-${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Output image info
        run: |
          echo "Single deployment tag: ${{ secrets.DOCKERHUB_USERNAME }}/purchase-request-site:main-${{ github.sha }}"
          echo "All image tags: ${{ steps.meta.outputs.tags }}"
          echo "Image digest: ${{ steps.build.outputs.digest }}"
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.deploy == true))
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          debug: true
          script: |
            cd /home/raj/purchase-request-site
            echo "Starting deployment for commit: ${{ github.sha }}"
            IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/purchase-request-site:main-${{ github.sha }}"
            echo "Deploying image: $IMAGE_TAG"

            # Update git repository safely
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Login to Docker Hub on server
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Stop existing container if running
            docker compose down || true

            # Pull the exact image built for this commit
            echo "Pulling deployment image from Docker Hub..."
            docker pull "$IMAGE_TAG"

            # Start the application with this exact immutable image tag
            echo "Starting application with deployment image..."
            export APP_IMAGE="$IMAGE_TAG"
            docker compose --env-file .env up -d --no-build --pull never
            sleep 10

            # Check if container is running
            if docker compose ps | grep -q "Up"; then
              echo "Application started successfully"
              docker compose logs --tail=20
            else
              echo "Error: Application failed to start"
              docker compose logs
              exit 1
            fi

            # Conservative cleanup: remove dangling images only
            echo "Cleaning up dangling Docker images..."
            docker image prune -f

            echo "Deployment completed successfully"
