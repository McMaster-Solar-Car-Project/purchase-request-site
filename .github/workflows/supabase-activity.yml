name: Ping Supabase to Prevent Pausing

on:
  schedule:
    # Run every (Monday and Thursday at 9 AM UTC) to prevent 7-day inactivity timeout
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use Node.js 20 LTS

      # Step 3: Install Supabase Client
      - name: Install Supabase Client
        run: npm install @supabase/supabase-js --force

      # Step 4: Ping Supabase Database
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          (async () => {
            try {
              console.log('Starting Supabase database ping to prevent inactivity...');
              
              // Validate environment variables (without logging them)
              if (!process.env.SUPABASE_URL || !process.env.SUPABASE_SERVICE_ROLE_KEY) {
                throw new Error('Missing required environment variables: SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY');
              }
              
              console.log('Environment variables validated successfully');

              // Import Supabase client
              const { createClient } = require('@supabase/supabase-js');
              const supabase = createClient(
                process.env.SUPABASE_URL, 
                process.env.SUPABASE_SERVICE_ROLE_KEY
              );

              console.log('Connecting to Supabase...');

              // Ping Supabase by querying the users table
              const { data, error } = await supabase
                .from('users')
                .select('id')
                .limit(1);

              if (error) {
                console.error('Supabase query error:', error.message);
                throw error;
              }

              console.log('Supabase ping successful!');
              console.log('Query result:', data ? \`Found \${data.length} record(s)\` : 'No data returned');
              console.log('Ping completed at:', new Date().toISOString());
              
            } catch (err) {
              console.error('Error pinging Supabase:', err.message);
              process.exit(1);
            }
          })();
          "