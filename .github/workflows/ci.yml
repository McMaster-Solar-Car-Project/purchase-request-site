name: Lint Check
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . ruff pytest
      - name: Format code with Ruff (push only)
        if: github.event_name == 'push'
        run: ruff format .
      - name: Format YAML with yamlfmt (push only)
        if: github.event_name == 'push'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/google/yamlfmt:latest \
            /workspace
      - name: Commit formatting changes (push only)
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: format code with ruff and yamlfmt"
      - name: Check Ruff formatting (pull request only)
        if: github.event_name == 'pull_request'
        run: ruff format --check .
      - name: Run Ruff lint
        run: ruff check --output-format=github .
      - name: Run tests
        run: pytest
      # Check YAML formatting (pull request only)
      - name: Check YAML formatting (pull request only)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/google/yamlfmt:latest \
            -lint /workspace
      # Run Gitleaks to scan for secrets
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is required for private repos, and for public repos to prevent rate limiting
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
